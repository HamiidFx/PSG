name: Auto Update Subscriptions

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install aiohttp geoip2 pytz

      - name: Run Main Bot (Fetch & Deduplicate)
        env: 
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Run Converter (Clash, Singbox, etc.)
        run: python convert.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update subscriptions [skip ci]"
          file_pattern: 'subscriptions/* lite/* config.txt api/* channelsData/channelsAssets.json'
